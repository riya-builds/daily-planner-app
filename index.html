<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Daily Planner</title>

  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <div class="top-bar">

      <div>

        <h1>📅 Daily Planner</h1>

        <p>
          Stay focused and organized every day
        </p>

      </div>

      <button onclick="toggleDarkMode()">
        🌙 Dark Mode
      </button>

    </div>
    
    <div class="stats-container">
      
      <div class="stat-card">
        <h3>Total Tasks</h3>
        <p id="totalTasks">0</p>
      </div>
      
      <div class="stat-card">
        
        <h3>Completed</h3>
        
        <p id="completedTasks">0</p>
      
      </div>
      
      <div class="stat-card">
        <h3>Water Goal</h3>
        <p id="waterStat">0/10</p>
      </div>
    </div>
    
    <div class="task-input">

      <input
        type="text"
        id="taskInput"
        placeholder="Enter your task"
      >

      <input
        type="time"
        id="taskTime"
      >

      <select id="taskPriority">

        <option value="High">
          🔴 High
        </option>

        <option value="Medium">
          🟡 Medium
        </option>

        <option value="Low">
          🟢 Low
        </option>

      </select>

      <button onclick="addTask()">
        ➕ Add Task
      </button>

    </div>

    <input
      type="text"
      id="searchInput"
      placeholder="🔍 Search task..."
      onkeyup="displayTasks()"
    >

    <br>

    <button onclick="clearCompleted()">
      ✅ Clear Completed Tasks
    </button>

    <div class="progress-section">

      <h3>📊 Daily Progress</h3>

      <div class="progress-bar">

        <div id="progressFill"></div>

      </div>

      <p id="progressText">
        0% Completed
      </p>

    </div>

    <ul id="taskList"></ul>

    <hr>

    <h2>💧 Water Tracker</h2>

    <p id="waterStatus">
      0 / 10 Glasses Completed
    </p>

    <div class="progress-bar">

      <div id="waterProgress"></div>

    </div>

    <br>

    <button onclick="drinkWater()">
      💧 Drink Water
    </button>

    <button onclick="resetWater()">
      🔄 Reset Water
    </button>

  </div>

  <script src="script.js"></script>

</body>

</html>
